<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Buku Tamu</title>
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="stylelogin.css">
    </head>
    <body>
        <div class="wrapper">
            <form>
                <h1>Buku Tamu</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nama" name="nama">
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Nomor Absen" name="absen" maxlength="2">
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Kelas" name="kls">
                    <i class='bx bxs-badge'></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Nama Sekolah" name="sekolah">
                    <i class='bx bxs-home'></i>
                </div>
                <button type="submit" class="btn" value="Proses">Kirim</button>
            </form>
        </div>
        <script src="loginscript.js"></script>
    </body>
</html>
